<!DOCTYPE html>
<html>
<head>

    <!-- CSS inside HTML -->
    <style>
        /* Element Selector */
        body {
            background-color: black;
            color: aqua;
            text-align: center;
            font-family: Arial;
        }

        /* ID Selector */
        #hero {
            color:gold;
            font-size: 40px;
        }

        /* Class Selector */
        .tagline {
            font-size: 20px;
            color: rgb(211, 211, 211);
        }

        /* Class Selector */
        .card {
            background-color: #e3e4da;
            width: 300px;
            margin: auto;
            padding: 15px;
            border-radius: 10px;
        }

        /* Descendant Selector */
        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* Attribute Selector */
        p[data-movie] {
            color: orange;
            font-weight: bold;
        }

        /* ID Selector */
        #fan {
            background-color: red;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <h1 id="hero">Jr. NTR</h1>

    <p class="tagline">The Man of Masses 🔥</p>

    <div class="card">
        <img src=" https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSR0PRp8u5-xOmxRAHOpF6z6FuF_6S_xAKJ9g&salt""Jr NTR">

        <p>Powerful acting & amazing dance moves</p>

        <button id="fan">I'm a Fan ❤️</button>
    </div>

    <p data-movie="devara">Popular Movie : DEVERA</p>

</body>
</html>
